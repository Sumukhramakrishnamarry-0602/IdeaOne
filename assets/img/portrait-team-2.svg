  <!-- head -->
  <circle cx="400.0" cy="360.0" r="160.0" fill="#FFFDF6" stroke="#1A1A1A" stroke-width="7"/>
  <circle cx="400.0" cy="360.0" r="160.0" fill="url(#dots_portrait-team-2)" opacity="0.10"/>

  <!-- simple comic face: brow + eyes + smile, suggested not literal -->
  <line x1="332.8" y1="340.8" x2="380.8" y2="331.2" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
  <line x1="419.2" y1="331.2" x2="467.2" y2="340.8" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
  <circle cx="358.4" cy="366.4" r="11.200000000000001" fill="#1A1A1A"/>
  <circle cx="441.6" cy="366.4" r="11.200000000000001" fill="#1A1A1A"/>
  <path d="M355.2,427.2 Q400.0,459.2 444.8,427.2" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>

  <!-- monogram badge, lower corner -->
  <g transform="translate(608.0,800.0)">
    <circle r="68.0" fill="#D63C1E" stroke="#1A1A1A" stroke-width="5"/>
    <text x="0" y="24.0" text-anchor="middle" fill="#FFFDF6" font-family="Anton, sans-serif" font-size="60.0" letter-spacing="0.01em">RL</text>
  </g>

