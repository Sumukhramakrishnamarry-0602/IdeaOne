<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <pattern id="dots_portrait-team-2" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="4.5" cy="4.5" r="2.88" fill="#1A1A1A"/>
    </pattern>
    <clipPath id="frame_portrait-team-2">
