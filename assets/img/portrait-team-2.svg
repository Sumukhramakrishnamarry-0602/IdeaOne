  </g>

  <!-- shoulders / body block -->
  <path d="M96.0,860.0 C96.0,620.0 224.00000000000003,520.0 400.0,500.0
           C576.0,520.0 704.0,620.0 704.0,860.0 L704.0,1000 L96.0,1000 Z"
        fill="#F5E6A8" stroke="#1A1A1A" stroke-width="7"/>
  <path d="M96.0,860.0 C96.0,620.0 224.00000000000003,520.0 400.0,500.0
